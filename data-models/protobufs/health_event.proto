syntax = "proto3";
package datamodels;


import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "github.com/yandex/protoc-gen-crd/library/go/k8s/protoc_gen_crd/proto/crd.proto";

option go_package = "github.com/nvidia/nvsentinel/data-models/pkg/protos";


// Common status string constants (for documentation/reference):
// NotStarted, InProgress, Failed, Succeeded, AlreadyDrained, UnQuarantined, Quarantined, AlreadyQuarantined, Cancelled

// OperationStatus represents the status and message for an operation.
message OperationStatus {
  string status = 1;
  string message = 2;
}

// HealthEventStatus represents the status fields for a health event.
message HealthEventStatus {
  string nodeQuarantined = 1;
  google.protobuf.Timestamp quarantineFinishTimestamp = 2;
  OperationStatus userPodsEvictionStatus = 3;
  google.protobuf.Timestamp drainFinishTimestamp = 4;
  google.protobuf.BoolValue faultRemediated = 5;
  google.protobuf.Timestamp lastRemediationTimestamp = 6;
}

// HealthEventWithStatus combines HealthEvent and HealthEventStatus for CRD generation.
message HealthEventWithStatus {
  google.protobuf.Timestamp createdAt = 1;
  HealthEvent healthEvent = 2;
  HealthEventStatus healthEventStatus = 3;
}

service PlatformConnector {
  rpc HealthEventOccurredV1(HealthEvents) returns (google.protobuf.Empty) {}
}

message HealthEvents {
  uint32 version = 1;
  repeated HealthEvent events = 2;
}

// ProcessingStrategy defines how downstream modules should handle the event.
// UNSPECIFIED: events without an explicit strategy use this default, which platform-connector normalizes to EXECUTE_REMEDIATION.
// EXECUTE_REMEDIATION: normal behavior; downstream modules may update cluster state.
// STORE_ONLY: observability-only behavior; event should be persisted/exported but should not modify cluster resources.
enum ProcessingStrategy {
  UNSPECIFIED = 0;
  EXECUTE_REMEDIATION = 1;
  STORE_ONLY = 2;
}

enum RecommendedAction {
  NONE = 0;
  COMPONENT_RESET = 2;
  CONTACT_SUPPORT = 5;
  RUN_FIELDDIAG = 6;
  RESTART_VM = 15;
  RESTART_BM = 24;
  REPLACE_VM = 25;
  RUN_DCGMEUD = 26;

  UNKNOWN = 99;
}

message Entity {
  string entityType = 1;
  string entityValue = 2;
}

message HealthEvent {
  uint32 version = 1;

  string agent = 2;
  string componentClass = 3;

  string checkName = 4;
  bool isFatal = 5;
  bool isHealthy = 6;
  string message = 7;
  RecommendedAction recommendedAction = 8;
  repeated string errorCode = 9;
  repeated Entity entitiesImpacted = 10;

  map<string, string> metadata = 11;
  google.protobuf.Timestamp generatedTimestamp = 12;
  string nodeName = 13;
  BehaviourOverrides quarantineOverrides = 14;
  BehaviourOverrides drainOverrides = 15;
  ProcessingStrategy processingStrategy = 16;
  string id = 17;
}

message BehaviourOverrides {
  bool force = 1;
  bool skip = 2;
}

// HealthEventResource is the root type for CRD generation.
// This will map to Kubernetes .spec and .status fields.
message HealthEventResource {
  option (protoc_gen_crd.k8s_crd) = {
    api_group: "healthevents.dgxc.nvidia.com",
    kind: "HealthEventResource",
    plural: "healtheventresources",
    singular: "healtheventresource",
    categories: ["nvidia", "gpu"]
  };
  HealthEvent spec = 1;
  HealthEventStatus status = 2;
}