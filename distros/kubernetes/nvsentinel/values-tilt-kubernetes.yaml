# Kubernetes CRD-based datastore values for Tilt development
# This file is included when USE_KUBERNETES=1 is set
# Example: USE_KUBERNETES=1 tilt up -f tilt/Tiltfile

global:
  dryRun: false
  kubeVersion: 1.31.0
  clusterType: standalone

  # Keep legacy resource naming for Tilt compatibility
  useLegacyResourceNames: true

  # Configure Kubernetes CRDs as the datastore provider
  datastore:
    provider: "kubernetes"
    namespace: "nvsentinel"

  # Disable MongoDB store when using Kubernetes CRDs
  mongodbStore:
    enabled: false

  # csp-health-monitor uses MaintenanceEvents with a legacy MongoDB-only code path;
  # disable it when using the Kubernetes CRD datastore for HealthEvents
  cspHealthMonitor:
    enabled: false

  # Enable the CRD subchart so HealthEventResource CRD is installed
  k8sdatastoreCrds:
    enabled: true

# Disable PostgreSQL subchart
postgresql:
  enabled: false

# Disable MongoDB-specific configuration
mongodb-store:
  mongodb:
    enabled: false
